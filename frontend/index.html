<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Theme persistence: prevent flash of wrong theme before React mounts -->
  <script>
    (function () {
      var stored = localStorage.getItem('compareintel-theme');
      var theme = (stored === 'light' || stored === 'dark') ? stored : 'light';
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
      document.documentElement.classList.add('preload');
    })();
  </script>
  <!-- Favicons: SVG-only for browser tab (brand/tab.svg has contrasting disk for tab visibility).
       Chrome prefers ICO/PNG over SVG when both are linked, so we omit ICO and PNG rel=icon to ensure the tab
       uses our updated design. brand/favicon.ico and large PNGs remain on disk for crawlers (GET /favicon.ico) and PWA manifest. -->
  <link rel="icon" type="image/svg+xml" href="/brand/tab.svg" />
  <!-- Hero capability demos: warm cache before React (query must match CAPABILITY_VIDEO_CACHE_BUST in Hero.tsx) -->
  <link rel="preload" href="/videos/natural_language.mp4?v=2" as="video" type="video/mp4" />
  <link rel="preload" href="/videos/code-generation.mp4?v=2" as="video" type="video/mp4" />
  <link rel="preload" href="/videos/formatted-math.mp4?v=2" as="video" type="video/mp4" />
  <link rel="preload" href="/videos/image-generation.mp4?v=2" as="video" type="video/mp4" />
  <link rel="apple-touch-icon" type="image/svg+xml" href="/brand/logo.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/brand/apple-touch-icon-180.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Content Security Policy -->
  <!-- Note: frame-ancestors is set via HTTP header (nginx) as meta tags don't support it -->
  <!-- img-src: 'self', data:, and compareintel.com for social images -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.google.com https://www.gstatic.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://compareintel.com; connect-src 'self' https://www.google.com https://photon.komoot.io https://api.zippopotam.us https://fonts.googleapis.com https://fonts.gstatic.com; frame-src https://www.google.com; base-uri 'self'; form-action 'self';" />

  <!-- Preconnect to Google Fonts for faster font loading - MUST be before font stylesheet -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Google Fonts: Sora (headings) + Plus Jakarta Sans (body) -->
  <!-- Load asynchronously to avoid render-blocking (improves FCP/LCP for Lighthouse) -->
  <!-- media="print" defers load; onload switches to "all" when ready. display=swap shows fallback until loaded. -->
  <!-- crossorigin enables JS access to stylesheet rules (needed by html-to-image for screenshots) -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    media="print" onload="this.media='all'" crossorigin />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      crossorigin />
  </noscript>

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="CompareIntel" />
  <meta name="application-name" content="CompareIntel" />
  <meta name="msapplication-TileColor" content="#2563eb" />
  <meta name="msapplication-TileImage" content="/brand/pwa-any-192.png" />

  <!-- PWA Manifest - Injected by VitePWA plugin -->

  <!-- Primary Meta Tags -->
  <title>CompareIntel - Compare AI & Image Models Side-by-Side | Free</title>
  <meta name="description"
    content="Compare AI language and image models side-by-side. Test GPT-5, Claude, Gemini, FLUX, DALL-E from OpenAI, Anthropic, Google, Meta, xAI. Image generation comparison included. Free tier." />
  <meta name="keywords"
    content="AI comparison, compare AI models, AI image comparison, GPT-5, Claude, Gemini, FLUX, DALL-E, Imagen, LLM benchmark, image generation comparison, free AI" />
  <meta name="author" content="CompareIntel" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="language" content="English" />
  <meta name="rating" content="general" />
  <meta name="distribution" content="global" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://compareintel.com/" />
  <meta property="og:title" content="CompareIntel - AI & Image Model Comparison Side-by-Side | Free" />
  <meta property="og:description"
    content="Compare AI language and image models side-by-side. Test GPT-5.4, Claude 4.6, Gemini 3, FLUX from OpenAI, Anthropic, Google, Meta, xAI. Free tier." />
  <meta property="og:image" content="https://compareintel.com/CompareIntel-social.png?v=__SOCIAL_IMAGE_VERSION__" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:alt"
    content="CompareIntel - AI and image model comparison platform with side-by-side testing" />
  <meta property="og:site_name" content="CompareIntel" />
  <meta property="og:locale" content="en_US" />
  <!-- fb:app_id - Using Facebook's default App ID to suppress warning (deprecated but still flagged by Debugger) -->
  <meta property="fb:app_id" content="966242223397117" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://compareintel.com/" />
  <meta name="twitter:title" content="CompareIntel - AI & Image Model Comparison Side-by-Side | Free" />
  <meta name="twitter:description"
    content="Compare AI language and image models side-by-side. GPT-5.4, Claude 4.6, Gemini 3, FLUX. Free tier." />
  <meta name="twitter:image" content="https://compareintel.com/CompareIntel-social.png?v=__SOCIAL_IMAGE_VERSION__" />
  <meta name="twitter:image:alt" content="CompareIntel - AI and image model comparison platform" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://compareintel.com/" />

  <!-- Prism.js will be loaded dynamically when needed (see utils/prismLoader.ts) -->

</head>
