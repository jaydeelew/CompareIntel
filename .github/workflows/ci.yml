name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PYTHON_VERSION: '3.11'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      seo: ${{ steps.filter.outputs.seo }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Detect changed paths
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - 'frontend/src/data/**'
              - '.github/workflows/ci.yml'
            seo:
              - 'frontend/public/sitemap.xml'
              - 'frontend/index.html'
              - 'frontend/public/robots.txt'
              - 'frontend/src/utils/pageMeta.ts'

  frontend-lint:
    name: Frontend Lint & Type Check
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Run TypeScript type check
        run: npm run type-check
      
      - name: Check formatting
        run: npm run format:check

  frontend-test:
    name: Frontend Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Create coverage directory
        run: mkdir -p coverage/.tmp
      
      - name: Run unit tests with coverage (Vitest enforces thresholds in vite.config.ts)
        run: npm run test:coverage
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  frontend-build:
    name: Frontend Build & Bundle Analysis
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build for production
        run: npm run build
      
      - name: Check bundle size
        run: npm run bundle:size
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
      
      - name: Upload bundle analysis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: frontend/dist/stats.html
          retention-days: 7
          if-no-files-found: ignore
      
      - name: Comment bundle size on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## 📦 Bundle Size Check
            
            Bundle size check completed. View the detailed analysis in the workflow artifacts.
            
            **Artifacts available:**
            - \`bundle-analysis\` - Detailed bundle stats
            - \`frontend-dist\` - Production build
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  frontend-lighthouse:
    name: Lighthouse Performance
    needs: [detect-changes, frontend-build]
    if: |
      (needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') &&
      needs.frontend-build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Run Lighthouse CI
        run: npm run lighthouse:ci

      - name: Upload Lighthouse report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: frontend/.lighthouseci/
          retention-days: 7
          if-no-files-found: ignore

  backend-lint:
    name: Backend Lint & Type Check
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      
      - name: Run Ruff linter
        run: ruff check .
      
      - name: Run Ruff formatter check
        run: ruff format --check .
      
      - name: Run Mypy type check
        run: mypy app --ignore-missing-imports

  backend-test:
    name: Backend Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    
    # Redis service container for distributed rate limiting tests
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    
    env:
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: test-secret-key-for-ci-only
      ENVIRONMENT: test
      SKIP_CONFIG_VALIDATION: true
      TEST_REDIS_URL: redis://localhost:6379/15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      
      - name: Verify Redis is available
        run: |
          redis-cli -h localhost -p 6379 ping || echo "Redis not available (tests will skip gracefully)"
      
      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Sync Help Me Choose with registry
        run: python scripts/sync_help_me_choose_with_registry.py
      
      - name: Run integration tests (including Redis rate limiting)
        run: pytest tests/integration/ -v --cov=app --cov-report=xml --cov-report=term-missing --cov-append
      
      - name: Run backend E2E tests
        run: pytest tests/e2e/ -v --no-cov
      
      - name: Check coverage threshold
        run: python -m coverage report --precision=6 --fail-under=69.99
      
      - name: Generate HTML coverage report
        if: success()
        run: |
          python -m coverage html --directory=htmlcov || echo "Warning: Could not generate HTML coverage report"
      
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
      
      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov/
          retention-days: 7
          if-no-files-found: ignore

  e2e-test-critical:
    name: E2E Tests - Critical User Flows
    needs: [detect-changes, frontend-build, backend-test]
    if: |
      (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.frontend-build.result == 'success' || needs.frontend-build.result == 'skipped') &&
      (needs.backend-test.result == 'success' || needs.backend-test.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    env:
      DATABASE_URL: sqlite:///./test-e2e.db
      SECRET_KEY: test-secret-key-for-ci-only
      ENVIRONMENT: development
      SKIP_CONFIG_VALIDATION: true
      CI: true
      PLAYWRIGHT_BASE_URL: http://localhost:5173
      BACKEND_URL: http://localhost:8000
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set test secrets as environment variables
        env:
          OPENROUTER_API_KEY: ${{ secrets.TEST_OPENROUTER_API_KEY }}
          TEST_FREE_EMAIL: ${{ secrets.TEST_FREE_EMAIL }}
          TEST_FREE_PASSWORD: ${{ secrets.TEST_FREE_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        run: |
          echo "OPENROUTER_API_KEY=$OPENROUTER_API_KEY" >> $GITHUB_ENV
          echo "TEST_FREE_EMAIL=$TEST_FREE_EMAIL" >> $GITHUB_ENV
          echo "TEST_FREE_PASSWORD=$TEST_FREE_PASSWORD" >> $GITHUB_ENV
          echo "ADMIN_EMAIL=$ADMIN_EMAIL" >> $GITHUB_ENV
          echo "ADMIN_PASSWORD=$ADMIN_PASSWORD" >> $GITHUB_ENV
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      
      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium firefox webkit
      
      - name: Initialize test database directory
        run: |
          cd backend
          mkdir -p data
          touch data/.gitkeep || true
      
      - name: Run critical E2E tests (core user journeys)
        working-directory: frontend
        run: |
          # Run critical user journey tests on Chromium only for speed
          # These tests cover: registration, login, comparison, conversation management
          npm run test:e2e -- \
            --project=chromium \
            --grep="(Unregistered User Journey|Registration and Onboarding|Authenticated User Comparison Flow|Conversation Management|Advanced Features|Navigation and Content Pages|Mobile Platform Tests|PWA Features|Results Display Regression)" \
            --timeout=90000
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-critical
          path: frontend/playwright-report/
          retention-days: 7
      
      - name: Upload Playwright screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-critical
          path: frontend/test-results/
          retention-days: 7

  e2e-test-browsers:
    name: E2E Tests - Cross-Browser & Mobile
    needs: [detect-changes, frontend-build, backend-test]
    if: |
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch') &&
      (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.frontend-build.result == 'success' || needs.frontend-build.result == 'skipped') &&
      (needs.backend-test.result == 'success' || needs.backend-test.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    env:
      DATABASE_URL: sqlite:///./test-e2e.db
      SECRET_KEY: test-secret-key-for-ci-only
      ENVIRONMENT: development
      SKIP_CONFIG_VALIDATION: true
      CI: true
      PLAYWRIGHT_BASE_URL: http://localhost:5173
      BACKEND_URL: http://localhost:8000
    
    strategy:
      fail-fast: false
      matrix:
        project:
          - chromium
          - firefox
          - webkit
          - 'Mobile Safari - iPhone 12'
          - 'Mobile Chrome - Pixel 5'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set test secrets as environment variables
        env:
          OPENROUTER_API_KEY: ${{ secrets.TEST_OPENROUTER_API_KEY }}
          TEST_FREE_EMAIL: ${{ secrets.TEST_FREE_EMAIL }}
          TEST_FREE_PASSWORD: ${{ secrets.TEST_FREE_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        run: |
          echo "OPENROUTER_API_KEY=$OPENROUTER_API_KEY" >> $GITHUB_ENV
          echo "TEST_FREE_EMAIL=$TEST_FREE_EMAIL" >> $GITHUB_ENV
          echo "TEST_FREE_PASSWORD=$TEST_FREE_PASSWORD" >> $GITHUB_ENV
          echo "ADMIN_EMAIL=$ADMIN_EMAIL" >> $GITHUB_ENV
          echo "ADMIN_PASSWORD=$ADMIN_PASSWORD" >> $GITHUB_ENV
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      
      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Install Playwright browsers
        run: |
          cd frontend
          # Install appropriate browser based on project
          if [[ "${{ matrix.project }}" == "chromium" ]]; then
            npx playwright install --with-deps chromium
          elif [[ "${{ matrix.project }}" == "firefox" ]]; then
            npx playwright install --with-deps firefox
          elif [[ "${{ matrix.project }}" == "webkit" ]]; then
            npx playwright install --with-deps webkit
          else
            # Mobile projects use chromium or webkit
            npx playwright install --with-deps chromium webkit
          fi
      
      - name: Initialize test database directory
        run: |
          cd backend
          mkdir -p data
          touch data/.gitkeep || true
      
      - name: Run E2E tests on ${{ matrix.project }}
        working-directory: frontend
        run: |
          npm run test:e2e -- --project="${{ matrix.project }}" --timeout=90000
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: frontend/playwright-report/
          retention-days: 7
      
      - name: Upload Playwright screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ matrix.project }}
          path: frontend/test-results/
          retention-days: 7

  e2e-test-accessibility:
    name: E2E Tests - Accessibility (WCAG 2.1 AA)
    needs: [detect-changes, frontend-build, backend-test]
    if: |
      (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.frontend-build.result == 'success' || needs.frontend-build.result == 'skipped') &&
      (needs.backend-test.result == 'success' || needs.backend-test.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      DATABASE_URL: sqlite:///./test-e2e.db
      SECRET_KEY: test-secret-key-for-ci-only
      ENVIRONMENT: development
      SKIP_CONFIG_VALIDATION: true
      CI: true
      PLAYWRIGHT_BASE_URL: http://localhost:5173
      BACKEND_URL: http://localhost:8000
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set test secrets as environment variables
        env:
          OPENROUTER_API_KEY: ${{ secrets.TEST_OPENROUTER_API_KEY }}
          TEST_FREE_EMAIL: ${{ secrets.TEST_FREE_EMAIL }}
          TEST_FREE_PASSWORD: ${{ secrets.TEST_FREE_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        run: |
          echo "OPENROUTER_API_KEY=$OPENROUTER_API_KEY" >> $GITHUB_ENV
          echo "TEST_FREE_EMAIL=$TEST_FREE_EMAIL" >> $GITHUB_ENV
          echo "TEST_FREE_PASSWORD=$TEST_FREE_PASSWORD" >> $GITHUB_ENV
          echo "ADMIN_EMAIL=$ADMIN_EMAIL" >> $GITHUB_ENV
          echo "ADMIN_PASSWORD=$ADMIN_PASSWORD" >> $GITHUB_ENV
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      
      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium
      
      - name: Initialize test database directory
        run: |
          cd backend
          mkdir -p data
          touch data/.gitkeep || true
      
      - name: Run accessibility tests
        working-directory: frontend
        run: |
          npm run test:e2e -- --project=chromium --grep="Accessibility" --timeout=90000
      
      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: frontend/playwright-report/
          retention-days: 7

  security-scan:
    name: Security Scan
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install pip-audit
        run: pip install pip-audit
      
      - name: Check Python dependencies for vulnerabilities
        run: |
          cd backend
          # PYSEC-2026-161 (starlette Host header bypass): fixed in starlette>=1.0.1 (see requirements.in).
          grep '^starlette==' requirements.txt
          # CVE-2026-4539 (pygments ReDoS): no fixed release on PyPI yet; remove ignore when pygments >2.19.2 ships.
          # PYSEC-2025-183 (pyjwt weak encryption): disputed by upstream; fixed in PyJWT>=2.13.0 for PYSEC-2026-175–179.
          pip-audit -r requirements.txt \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln PYSEC-2025-183
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Run npm audit
        run: |
          cd frontend
          npm audit --audit-level=high --omit=dev
      
      - name: Check for hardcoded secrets
        run: |
          # Basic check for common secret patterns (not exhaustive)
          if grep -r "password.*=.*['\"].*[a-zA-Z0-9]" backend/app --include="*.py" | grep -v "test" | grep -v "#"; then
            echo "⚠️  Warning: Potential hardcoded credentials found. Review manually."
          fi
          if grep -r "api.*key.*=.*['\"].*[a-zA-Z0-9]" backend/app --include="*.py" | grep -v "test" | grep -v "#"; then
            echo "⚠️  Warning: Potential hardcoded API keys found. Review manually."
          fi
      
      - name: Check for SQL injection patterns
        run: |
          # Basic check for f-strings in SQL queries (should use parameterized queries)
          if grep -r "f\".*SELECT\|f\".*INSERT\|f\".*UPDATE\|f\".*DELETE" backend/app --include="*.py" | grep -v "test" | grep -v "#"; then
            echo "⚠️  Warning: Potential SQL injection risk. Use parameterized queries."
          fi

  ping-sitemap:
    name: Ping Sitemap (SEO)
    needs: detect-changes
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      needs.detect-changes.outputs.seo == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ping Google and Bing sitemap
        run: bash scripts/ping-sitemap.sh

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  ci-success:
    name: CI Success
    needs: [
      detect-changes,
      frontend-lint,
      frontend-test,
      frontend-build,
      frontend-lighthouse,
      backend-lint,
      backend-test,
      e2e-test-critical,
      e2e-test-browsers,
      e2e-test-accessibility,
      security-scan
    ]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Write CI results summary
        run: |
          {
            echo "## CI Results"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Detect Changes | ${{ needs.detect-changes.result }} |"
            echo "| Frontend Lint | ${{ needs.frontend-lint.result }} |"
            echo "| Frontend Tests | ${{ needs.frontend-test.result }} |"
            echo "| Frontend Build | ${{ needs.frontend-build.result }} |"
            echo "| Lighthouse | ${{ needs.frontend-lighthouse.result }} |"
            echo "| Backend Lint | ${{ needs.backend-lint.result }} |"
            echo "| Backend Tests | ${{ needs.backend-test.result }} |"
            echo "| E2E Tests (Critical) | ${{ needs.e2e-test-critical.result }} |"
            echo "| E2E Tests (Cross-browser) | ${{ needs.e2e-test-browsers.result }} |"
            echo "| E2E Tests (Accessibility) | ${{ needs.e2e-test-accessibility.result }} |"
            echo "| Security Scan | ${{ needs.security-scan.result }} |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check all jobs passed
        run: |
          declare -a FAILED_JOBS=()

          check_job() {
            local name="$1"
            local result="$2"
            if [[ "$result" == "failure" ]]; then
              FAILED_JOBS+=("$name")
              echo "::error title=CI job failed::$name ($result)"
            fi
          }

          check_job "Detect Changed Paths" "${{ needs.detect-changes.result }}"
          check_job "Frontend Lint" "${{ needs.frontend-lint.result }}"
          check_job "Frontend Tests" "${{ needs.frontend-test.result }}"
          check_job "Frontend Build" "${{ needs.frontend-build.result }}"
          check_job "Lighthouse Performance" "${{ needs.frontend-lighthouse.result }}"
          check_job "Backend Lint" "${{ needs.backend-lint.result }}"
          check_job "Backend Tests" "${{ needs.backend-test.result }}"
          check_job "E2E Tests (Critical)" "${{ needs.e2e-test-critical.result }}"
          check_job "E2E Tests (Cross-browser)" "${{ needs.e2e-test-browsers.result }}"
          check_job "E2E Tests (Accessibility)" "${{ needs.e2e-test-accessibility.result }}"
          check_job "Security Scan" "${{ needs.security-scan.result }}"

          if [[ ${#FAILED_JOBS[@]} -gt 0 ]]; then
            {
              echo "❌ One or more required jobs failed:"
              printf '%s\n' "${FAILED_JOBS[@]}" | sed 's/^/- /'
              echo ""
              echo "Open the failed job logs above for details (this step only aggregates results)."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "✅ All CI checks passed!" >> "$GITHUB_STEP_SUMMARY"
